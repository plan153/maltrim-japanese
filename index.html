<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>말트임 일본어 v1.4 🇯🇵</title>
<style>
:root {
  --primary: #1e3a8a;
  --primary-light: #3b82f6;
  --accent: #f59e0b;
  --success: #10b981;
  --danger: #ef4444;
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --border: #334155;
  --font-jp: 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', 'MS Gothic', sans-serif;
  --font-kr: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  --radius: 18px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-kr);
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}
body {
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  position: relative;
}

/* ── HEADER ─────────────────────────────────── */
.header {
  background: var(--surface);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}
.header-logo { font-size: 19px; font-weight: 800; letter-spacing: -0.5px; }
.header-logo span { color: var(--primary-light); }
.header-right { display: flex; align-items: center; gap: 8px; }
.v-badge {
  font-size: 10px; font-weight: 700;
  background: rgba(245,158,11,.15); color: var(--accent);
  border: 1px solid rgba(245,158,11,.3);
  padding: 2px 7px; border-radius: 8px;
}
.day-badge {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  user-select: none;
  transition: opacity .15s;
}
.day-badge:active { opacity: .8; }

/* ── PROGRESS ────────────────────────────────── */
.progress-bar { height: 3px; background: var(--surface2); }
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary-light), var(--accent));
  transition: width .6s cubic-bezier(.4,0,.2,1);
}

/* ── MAIN ────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 14px; overflow-y: auto; padding-bottom: 24px; }

.meta-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--text-dim);
  padding: 0 2px;
}
.day-title { font-weight: 600; }
.phrase-dots { display: flex; gap: 5px; align-items: center; }
.phrase-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--surface2);
  transition: background .3s;
}
.phrase-dot.active { background: var(--primary-light); }
.phrase-dot.done { background: var(--success); }

/* ── PHRASE CARD ─────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px 24px 24px;
  text-align: center;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
  min-height: 185px;
  justify-content: center;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary-light), var(--accent));
}
.jp-reading {
  font-size: 13px;
  color: var(--primary-light);
  letter-spacing: .15em;
  font-family: var(--font-kr);
  transition: opacity .35s;
  min-height: 18px;
}
.jp-reading.hidden { opacity: 0; }
.jp-text {
  font-size: 30px;
  font-weight: 800;
  color: var(--text);
  font-family: var(--font-jp);
  letter-spacing: .06em;
  line-height: 1.45;
  transition: filter .35s;
  word-break: break-all;
}
.jp-text.blurred { filter: blur(9px); user-select: none; }
.kr-meaning {
  font-size: 13px;
  color: var(--text-dim);
  transition: opacity .35s;
  min-height: 18px;
}
.kr-meaning.hidden { opacity: 0; }
.btn-show {
  background: transparent;
  border: 1px solid var(--primary-light);
  color: var(--primary-light);
  padding: 7px 22px;
  border-radius: 30px;
  font-size: 12.5px;
  font-family: var(--font-kr);
  cursor: pointer;
  transition: all .2s;
  margin-top: 4px;
}
.btn-show:hover, .btn-show:active { background: var(--primary-light); color: #fff; }

/* ── AUDIO CONTROLS ──────────────────────────── */
.audio-row { display: flex; gap: 10px; }
.btn-audio {
  flex: 1;
  padding: 13px 10px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font-kr);
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  line-height: 1.2;
}
.btn-play {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text);
}
.btn-play:hover { border-color: var(--primary-light); color: var(--primary-light); }
.btn-play.playing { border-color: var(--accent); color: var(--accent); }
.btn-lr {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  flex: 1.6;
}
.btn-lr:hover { opacity: .9; }
.btn-lr:disabled { opacity: .4; cursor: not-allowed; }
.btn-lr .lr-badge {
  font-size: 10px;
  background: rgba(255,255,255,.22);
  padding: 2px 7px;
  border-radius: 10px;
}

/* ── MIC AREA ────────────────────────────────── */
.mic-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.mic-hint { font-size: 12px; color: var(--text-dim); }
.waveform {
  display: flex; align-items: center; gap: 4px;
  height: 28px; opacity: 0; transition: opacity .3s;
}
.waveform.active { opacity: 1; }
.wave-bar {
  width: 4px; background: var(--danger);
  border-radius: 3px; animation: wave .7s ease-in-out infinite;
}
.wave-bar:nth-child(1) { animation-delay: 0s; }
.wave-bar:nth-child(2) { animation-delay: .1s; }
.wave-bar:nth-child(3) { animation-delay: .2s; }
.wave-bar:nth-child(4) { animation-delay: .3s; }
.wave-bar:nth-child(5) { animation-delay: .2s; }
.wave-bar:nth-child(6) { animation-delay: .1s; }
.wave-bar:nth-child(7) { animation-delay: 0s; }
@keyframes wave { 0%,100% { height: 5px; } 50% { height: 22px; } }

.btn-mic {
  width: 78px; height: 78px;
  border-radius: 50%;
  background: var(--surface2);
  border: 3px solid var(--border);
  color: var(--text);
  font-size: 30px;
  cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; justify-content: center;
  user-select: none; -webkit-user-select: none;
  position: relative;
}
.btn-mic:hover { border-color: var(--primary-light); transform: scale(1.05); }
.btn-mic.recording { background: var(--danger); border-color: var(--danger); animation: micPulse 1s infinite; }
@keyframes micPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.45); }
  50%      { box-shadow: 0 0 0 18px rgba(239,68,68,0); }
}

/* ── FEEDBACK PANEL ──────────────────────────── */
.feedback-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: none;
  flex-direction: column;
  gap: 12px;
  animation: slideUp .3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.feedback-panel.show { display: flex; }
.fb-label { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; }
.fb-text  { font-size: 18px; font-family: var(--font-jp); line-height: 1.7; }

/* diff colours */
.diff-ok   { color: var(--success); }
.diff-ng   { color: var(--danger); text-decoration: line-through; position: relative; cursor: help; }
.diff-miss { color: var(--accent); position: relative; cursor: help; }

/* Speech-bubble tooltip ─ [기능 C] */
.diff-ng::after, .diff-miss::after {
  content: attr(data-hint);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface2);
  color: var(--text);
  font-size: 11px;
  font-family: var(--font-kr);
  padding: 4px 9px;
  border-radius: 7px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity .2s;
  border: 1px solid var(--border);
  z-index: 50;
}
.diff-ng::before, .diff-miss::before {
  content: '';
  position: absolute;
  bottom: calc(100% + 1px);
  left: 50%; transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--surface2);
  pointer-events: none;
  opacity: 0; transition: opacity .2s;
  z-index: 51;
}
.diff-ng:hover::after, .diff-miss:hover::after,
.diff-ng:hover::before, .diff-miss:hover::before { opacity: 1; }

/* ── [기능 D] SPEEDOMETER ─────────────────────── */
.speedo-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.speedo-svg { width: 140px; height: 140px; }
.speedo-track { fill: none; stroke: var(--surface2); stroke-width: 11; }
.speedo-fill  {
  fill: none; stroke-width: 11; stroke-linecap: round;
  stroke-dasharray: 0 314;
  transition: stroke-dasharray 1.1s cubic-bezier(.4,0,.2,1), stroke .5s;
}
.speedo-score-num {
  font-size: 26px; font-weight: 900;
  text-anchor: middle; dominant-baseline: auto;
  fill: var(--text);
}
.speedo-unit {
  font-size: 11px; text-anchor: middle;
  fill: var(--text-dim);
}
.speedo-title {
  font-size: 14px; font-weight: 800;
  text-align: center; color: var(--text);
  min-height: 20px;
}
.speedo-sub {
  font-size: 12px; text-align: center;
  color: var(--text-dim); min-height: 16px;
}

/* ── [기능 A] FFD / VAD CHIPS ────────────────── */
.ffd-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.ffd-chip {
  font-size: 12px; font-weight: 600;
  padding: 5px 12px; border-radius: 20px;
  background: var(--surface2); color: var(--text-dim);
  border: 1px solid var(--border);
  transition: all .4s;
}
.ffd-chip.fast { background: rgba(16,185,129,.15); color: var(--success); border-color: rgba(16,185,129,.4); }
.ffd-chip.warn { background: rgba(245,158,11,.15); color: var(--accent);  border-color: rgba(245,158,11,.4); }
.ffd-chip.slow { background: rgba(239,68,68,.15);  color: var(--danger);  border-color: rgba(239,68,68,.4); }

/* ── [기능 B] ERROR LOCK LAYER ───────────────── */
.lock-layer {
  display: none;
  position: fixed; inset: 0;
  background: rgba(239,68,68,.12);
  z-index: 500;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(1px);
  animation: lockFlash .25s ease;
}
@keyframes lockFlash {
  0%   { background: rgba(239,68,68,.35); }
  100% { background: rgba(239,68,68,.12); }
}
.lock-layer.show { display: flex; }
.lock-banner {
  background: var(--danger);
  color: #fff;
  padding: 14px 28px;
  border-radius: 16px;
  font-size: 15px; font-weight: 800;
  text-align: center; line-height: 1.5;
  box-shadow: 0 8px 32px rgba(239,68,68,.4);
  animation: lockBounce .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes lockBounce {
  from { transform: scale(.7); opacity: 0; }
  to   { transform: scale(1);  opacity: 1; }
}

/* ── NAV ─────────────────────────────────────── */
.nav-row { display: flex; gap: 10px; }
.btn-nav {
  flex: 1; padding: 13px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 14px; font-family: var(--font-kr); font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.btn-nav:hover:not(:disabled) { border-color: var(--primary-light); color: var(--primary-light); }
.btn-nav:disabled { opacity: .3; cursor: not-allowed; }
.btn-nav.highlight { background: var(--success); border-color: var(--success); color: #fff; }

/* ── DAY DRAWER ──────────────────────────────── */
.drawer-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.55); z-index: 200;
  backdrop-filter: blur(2px);
}
.drawer-overlay.open { display: block; }
.day-drawer {
  position: fixed;
  bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 480px;
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  border-top: 1px solid var(--border);
  padding: 20px 20px 32px;
  z-index: 201;
  transition: transform .35s cubic-bezier(.4,0,.2,1);
}
.day-drawer.open { transform: translateX(-50%) translateY(0); }
.drawer-handle {
  width: 40px; height: 4px; background: var(--surface2);
  border-radius: 2px; margin: 0 auto 18px;
}
.drawer-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 7px; }
.day-btn {
  aspect-ratio: 1; border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--text);
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .18s;
  display: flex; align-items: center; justify-content: center;
}
.day-btn:hover { border-color: var(--primary-light); }
.day-btn.current { background: var(--primary); border-color: var(--primary); }
.day-btn.done    { border-color: var(--success); color: var(--success); }
.week-labels {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 7px; margin-bottom: 4px;
}
.week-label { font-size: 9px; color: var(--text-dim); text-align: center; }

/* ── L&R MODAL ───────────────────────────────── */
.lr-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(10,15,25,.96); z-index: 300;
  flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 28px; text-align: center;
}
.lr-modal.open { display: flex; }
.lr-close {
  position: absolute; top: 20px; right: 20px;
  background: var(--surface2); border: none;
  color: var(--text); width: 36px; height: 36px;
  border-radius: 50%; font-size: 15px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.lr-dots { display: flex; gap: 10px; margin-bottom: 30px; }
.lr-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--surface2); transition: all .3s;
}
.lr-dot.current { background: var(--primary-light); transform: scale(1.3); }
.lr-dot.done    { background: var(--success); }
.lr-icon {
  font-size: 72px; margin-bottom: 18px; display: block;
  animation: float 2s ease-in-out infinite;
}
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.lr-icon.mic-anim { animation: micFloat .6s ease-in-out infinite alternate; }
@keyframes micFloat { from { transform: scale(1); } to { transform: scale(1.18); } }
.lr-status { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.lr-sub    { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; }
.lr-phrase { font-size: 26px; font-weight: 800; font-family: var(--font-jp); color: var(--text); margin-bottom: 6px; word-break: break-all; }
.lr-reading { font-size: 13px; color: var(--primary-light); margin-bottom: 28px; }
.lr-score-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.lr-chip {
  padding: 6px 16px; border-radius: 20px;
  font-size: 13px; font-weight: 700;
  background: var(--surface); color: var(--text-dim);
  border: 1.5px solid var(--border); transition: all .3s;
}
.lr-chip.scored { background: rgba(16,185,129,.15); color: var(--success); border-color: var(--success); }
.lr-chip.fail   { background: rgba(239,68,68,.15);  color: var(--danger);  border-color: var(--danger); }

/* LR 내부 speedometer */
.lr-speedo { margin: 10px 0 0; }
.lr-speedo .speedo-svg { width: 100px; height: 100px; }

/* ── TOAST ───────────────────────────────────── */
.toast {
  position: fixed; bottom: 40px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 11px 20px; border-radius: 30px;
  font-size: 13px; font-weight: 600;
  opacity: 0; pointer-events: none;
  transition: all .3s; z-index: 600; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── STATS BUTTON ─────────────────────────── */
.stats-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-size: 15px;
  border-radius: 50%; width: 32px; height: 32px;
  cursor: pointer; transition: color .15s, border-color .15s;
  display: flex; align-items: center; justify-content: center;
}
.stats-btn:active { color: var(--accent); border-color: var(--accent); }

/* ── STATS MODAL ──────────────────────────── */
.stats-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 300; display: none;
  align-items: flex-start; justify-content: center;
  padding: 16px; overflow-y: auto;
}
.stats-overlay.open { display: flex; }
.stats-box {
  background: var(--surface); border-radius: var(--radius);
  width: 100%; max-width: 440px; padding: 20px;
  margin: auto;
}
.stats-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.stats-title { font-size: 18px; font-weight: 800; }
.stats-close {
  background: none; border: none; color: var(--text-dim);
  font-size: 18px; cursor: pointer; padding: 4px 8px;
}
.stat-card-row { display: flex; gap: 10px; margin-bottom: 20px; }
.stat-card {
  flex: 1; background: var(--surface2); border-radius: 12px;
  padding: 12px 6px; text-align: center;
}
.stat-card-val { font-size: 20px; font-weight: 800; color: var(--primary-light); }
.stat-card-lbl { font-size: 10px; color: var(--text-dim); margin-top: 3px; }
.chart-section { margin-bottom: 20px; }
.chart-title {
  font-size: 11px; color: var(--text-dim); font-weight: 700;
  margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px;
}
.chart-svg { width: 100%; overflow: visible; }
.chart-empty { text-align: center; color: var(--text-dim); font-size: 13px; padding: 20px 0; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-logo">말트임 <span>일본어</span> 🇯🇵</div>
  <div class="header-right">
    <button class="stats-btn" onclick="openStats()" title="학습 통계">📊</button>
    <span class="v-badge">v1.4</span>
    <div class="day-badge" id="dayBadge" onclick="openDrawer()">Day 1 / 30</div>
  </div>
</header>

<!-- PROGRESS -->
<div class="progress-bar">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<!-- MAIN -->
<main class="main">

  <!-- meta -->
  <div class="meta-row">
    <div class="day-title" id="dayTitle">Day 1 · 핵심 뼈대 세우기</div>
    <div class="phrase-dots" id="phraseDots"></div>
  </div>

  <!-- card -->
  <div class="card">
    <div class="jp-reading hidden" id="jpReading"></div>
    <div class="jp-text blurred"   id="jpText">いきます</div>
    <div class="kr-meaning hidden" id="krMeaning"></div>
    <button class="btn-show" id="btnShow" onclick="toggleReveal()">👁️ 보기 / 정답 확인</button>
  </div>

  <!-- audio -->
  <div class="audio-row">
    <button class="btn-audio btn-play" id="btnPlay" onclick="playTTS()">🔊 듣기</button>
    <button class="btn-audio btn-lr"   id="btnLR"   onclick="startLR()">
      🔁 듣고 따라하기 <span class="lr-badge">3회</span>
    </button>
  </div>

  <!-- mic -->
  <div class="mic-section">
    <div class="mic-hint">🎙 누르고 있는 동안 녹음 · STT 구동</div>
    <div class="waveform" id="waveform">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <button class="btn-mic" id="btnMic"
      onclick="S.recActive ? stopRec() : startRec(event)">🎤</button>
  </div>

  <!-- feedback panel ── v1.2 재설계 -->
  <div class="feedback-panel" id="feedbackPanel">

    <!-- 정답 diff -->
    <div>
      <div class="fb-label">✅ 정답 <span style="font-size:10px;opacity:.6">(hover → 힌트)</span></div>
      <div class="fb-text" id="fbOriginal"></div>
    </div>

    <!-- 내 발음 diff -->
    <div>
      <div class="fb-label">🗣 내가 말한 것</div>
      <div class="fb-text" id="fbSpoken"></div>
    </div>

// ════════════════════════════════════════════════════
// v1.4 — Google Neural2 TTS 사전 생성 오디오 맵
// ════════════════════════════════════════════════════
const AUDIO_BASE = 'https://plan153.github.io/maltrim-japanese/audio/';
const AUDIO_MAP = (() => {
  const m = {};
  Object.entries(CURRICULUM).forEach(([day, data]) => {
    data.phrases.forEach((p, i) => {
      m[p.jp] = `${AUDIO_BASE}d${String(day).padStart(2,'0')}_p${i}.mp3`;
    });
  });
  return m;
})();

// STATE  (v1.2 확장 — S.isPremium / S.isNativePlatform 분기 준비)

const S = {
  // ── 기존 상태 ──────────────────────────────────
  day: 1, phrase: 0,
  revealed: false,
  recActive: false, recObj: null,
  lrActive: false,  lrScores: [],

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
function init() {
  loadState();
  resolveVoice();
  buildDayGrid();
  render();
  document.addEventListener('click', () => {}, { once: true });
}

function loadState() {
  try {
    const d = JSON.parse(localStorage.getItem('maltrim_v2') || '{}');
    S.day         = d.day         || 1;
    S.phrase      = d.phrase      || 0;
    S.doneDays    = new Set(d.doneDays || []);
    S.donePhrases = d.donePhrases || {};
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('maltrim_v2', JSON.stringify({
      day: S.day, phrase: S.phrase,
      doneDays: [...S.doneDays],
      donePhrases: S.donePhrases,
    }));
  } catch(e) {}
}

// ════════════════════════════════════════════════════
// [v1.3] 통계 로깅
// ════════════════════════════════════════════════════
function logStat(sc, ffd, vad) {
  try {
    const raw = JSON.parse(localStorage.getItem('maltrim_stats_v1') || '[]');
    raw.push({ ts: Date.now(), day: S.day, score: sc, ffd: ffd || null, vad: vad || 0 });
    if (raw.length > 500) raw.splice(0, raw.length - 500);
    localStorage.setItem('maltrim_stats_v1', JSON.stringify(raw));
  } catch(e) {}
}

// ════════════════════════════════════════════════════
// [v1.3] 통계 대시보드
// ════════════════════════════════════════════════════
function openStats() {
  const raw = (() => {
    try { return JSON.parse(localStorage.getItem('maltrim_stats_v1') || '[]'); }
    catch(e) { return []; }
  })();

  // 요약 카드
  const total = raw.length;
  const avgScore = total
    ? Math.round(raw.reduce((s, r) => s + r.score, 0) / total) : 0;
  const ffdArr = raw.filter(r => r.ffd > 0);
  const avgFfd = ffdArr.length
    ? (ffdArr.reduce((s, r) => s + r.ffd, 0) / ffdArr.length / 1000).toFixed(1) : '—';

  $('statsCards').innerHTML = `
    <div class="stat-card"><div class="stat-card-val">${total}</div><div class="stat-card-lbl">총 연습 횟수</div></div>
    <div class="stat-card"><div class="stat-card-val">${avgScore}점</div><div class="stat-card-lbl">평균 정확도</div></div>
    <div class="stat-card"><div class="stat-card-val">${avgFfd}초</div><div class="stat-card-lbl">평균 반응속도</div></div>
  `;

  // 최근 7일 그룹
  const days7 = getLast7Days();
  const byDay = {};
  raw.forEach(r => {
    const d = new Date(r.ts);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!byDay[k]) byDay[k] = [];
    byDay[k].push(r);
  });

  // 정확도 바 차트
  const accData = days7.map(d => {
    const es = byDay[d] || [];
    return es.length ? Math.round(es.reduce((s,r) => s+r.score, 0) / es.length) : null;
  });
  $('accuracyChart').innerHTML = total
    ? renderBarChart(days7, accData, 100, '%')
    : '<div class="chart-empty">아직 연습 기록이 없습니다</div>';

  // FFD 라인 차트
  const ffdData = days7.map(d => {
    const es = (byDay[d] || []).filter(r => r.ffd > 0);
    return es.length ? Math.round(es.reduce((s,r) => s+r.ffd, 0) / es.length) : null;
  });
  $('ffdChart').innerHTML = ffdData.some(v => v !== null)
    ? renderLineChart(days7, ffdData, 3000)
    : '<div class="chart-empty">반응속도 기록 없음</div>';

  $('statsOverlay').classList.add('open');
}

function closeStats() { $('statsOverlay').classList.remove('open'); }

function getLast7Days() {
  const out = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    out.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  }
  return out;
}

function renderBarChart(days, values, maxVal, unit) {
  const W = 350, H = 80, bw = 34, gap = (W - bw * 7) / 8;
  let bars = '', lbls = '';
  values.forEach((v, i) => {
    const x  = gap + i * (bw + gap);
    const h  = v !== null ? Math.max(4, (v / maxVal) * H) : 3;
    const y  = H - h;
    const fc = v === null ? 'var(--surface2)'
             : v >= 85   ? '#10b981'
             : v >= 60   ? '#f59e0b' : '#ef4444';
    bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw}" height="${h.toFixed(1)}" rx="4" fill="${fc}" opacity="${v===null?.25:1}"/>`;
    if (v !== null)
      bars += `<text x="${(x+bw/2).toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="middle" fill="${fc}" font-size="9" font-weight="700">${v}${unit}</text>`;
    const [,mm,dd] = days[i].split('-');
    lbls += `<text x="${(x+bw/2).toFixed(1)}" y="${(H+14).toFixed(1)}" text-anchor="middle" fill="var(--text-dim)" font-size="9">${+mm}/${+dd}</text>`;
  });
  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H+20}" xmlns="http://www.w3.org/2000/svg">${bars}${lbls}</svg>`;
}

function renderLineChart(days, values, maxVal) {
  const W = 350, H = 80, bw = 34, gap = (W - bw * 7) / 8;
  const pts = values.map((v, i) => ({
    cx: gap + i * (bw + gap) + bw / 2,
    cy: v !== null ? H - (v / maxVal) * H : null, v
  }));
  let path = '', inSeg = false;
  pts.forEach(p => {
    if (p.cy !== null) { path += inSeg ? ` L${p.cx.toFixed(1)},${p.cy.toFixed(1)}` : `M${p.cx.toFixed(1)},${p.cy.toFixed(1)}`; inSeg = true; }
    else inSeg = false;
  });
  let dots = '', lbls = '';
  pts.forEach((p, i) => {
    const [,mm,dd] = days[i].split('-');
    lbls += `<text x="${p.cx.toFixed(1)}" y="${(H+14).toFixed(1)}" text-anchor="middle" fill="var(--text-dim)" font-size="9">${+mm}/${+dd}</text>`;
    if (p.cy !== null) {
      const sec = (p.v / 1000).toFixed(1);
      dots += `<circle cx="${p.cx.toFixed(1)}" cy="${p.cy.toFixed(1)}" r="4" fill="#f59e0b"/>`;
      dots += `<text x="${p.cx.toFixed(1)}" y="${(p.cy-8).toFixed(1)}" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="700">${sec}초</text>`;
    }
  });
  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H+20}" xmlns="http://www.w3.org/2000/svg"><path d="${path}" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linejoin="round"/>${dots}${lbls}</svg>`;
}

function resolveVoice() {
  const pick = () => {
    const vv = S.synth.getVoices();
    S.jpVoice = vv.find(v => v.lang === 'ja-JP' && /Google|Premium|Enhanced/.test(v.name))
             || vv.find(v => v.lang === 'ja-JP')
             || vv.find(v => v.lang.startsWith('ja'))
             || null;
  };
  pick();
  S.synth.addEventListener('voiceschanged', pick);
}

// ════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════
function render() {
  const day = CURRICULUM[S.day];
  const p   = day.phrases[S.phrase];

  $('dayBadge').textContent = `Day ${S.day} / 30`;
  $('dayTitle').textContent = `Day ${S.day}  ·  ${day.title}`;

  const pct = ((S.day - 1) + S.phrase / day.phrases.length) / 30 * 100;
  $('progressFill').style.width = pct.toFixed(1) + '%';

  // phrase dots
  const dotsCont = $('phraseDots');
  dotsCont.innerHTML = '';
  day.phrases.forEach((_, i) => {
    const el = document.createElement('div');
    const key = `${S.day}-${i}`;
    el.className = 'phrase-dot' + (i === S.phrase ? ' active' : S.donePhrases[key] ? ' done' : '');
    dotsCont.appendChild(el);
  });

  $('jpText').textContent    = p.jp;
  $('jpReading').textContent = p.rd;
  $('krMeaning').textContent = p.kr;

  S.revealed = false;
  applyReveal();

  $('feedbackPanel').classList.remove('show');
  S.lastScore = null;

  $('btnPrev').disabled = S.day === 1 && S.phrase === 0;
  $('btnNext').textContent = isLastPhrase() ? 'Day 완료 ✓' : '다음 ▶';
  $('btnNext').classList.toggle('highlight', isLastPhrase());
}

function applyReveal() {
  $('jpText').classList.toggle('blurred', !S.revealed);
  $('jpReading').classList.toggle('hidden', !S.revealed);
  $('krMeaning').classList.toggle('hidden', !S.revealed);
  $('btnShow').textContent = S.revealed ? '🙈 가리기' : '👁️ 보기 / 정답 확인';
}

function toggleReveal() { S.revealed = !S.revealed; applyReveal(); }
function isLastPhrase() { return S.phrase >= CURRICULUM[S.day].phrases.length - 1; }

// ════════════════════════════════════════════════════
// NAVIGATION  ── [기능 B] 오답 락 루프 적용
// ════════════════════════════════════════════════════
function nextPhrase() {
  if (S.lockActive) return;

  // 85점 미만이면 진도 고정 → 자동 재녹음 루프
  if (S.lastScore !== null && S.lastScore < 85) {
    triggerErrorLock(S.lastScore);
    return;
  }

  const key = `${S.day}-${S.phrase}`;
  S.donePhrases[key] = true;

  if (!isLastPhrase()) {
    S.phrase++;
  } else {
    S.doneDays.add(S.day);
    if (S.day < 30) { S.day++; S.phrase = 0; }
    buildDayGrid();
  }
  saveState();
  render();
}

function prevPhrase() {
  if (S.lockActive) return;
  if (S.phrase > 0) {
    S.phrase--;
  } else if (S.day > 1) {
    S.day--;
    S.phrase = CURRICULUM[S.day].phrases.length - 1;
    buildDayGrid();
  }
  saveState();
  render();
}

function goToDay(d) {
  S.lockActive = false;
  $('lockLayer').classList.remove('show');
  S.day = d; S.phrase = 0;
  saveState(); render(); closeDrawer(); buildDayGrid();
}

// [기능 B] 오답 락 루프
function triggerErrorLock(sc) {
  S.lockActive = true;
  const layer  = $('lockLayer');
  const banner = $('lockBanner');
  banner.innerHTML = `🔒 ${sc}점 — 85점 이상이어야 넘어갈 수 있어요!<br><span style="font-size:13px;opacity:.85">1.5초 후 자동 재시도...</span>`;
  layer.classList.add('show');

  setTimeout(() => {
    layer.classList.remove('show');
    S.lockActive = false;
    // 자동 재녹음 파이프라인 재기동
    startRec();
  }, 1500);
}

// ════════════════════════════════════════════════════
// TTS  ── [v1.4] Google Neural2 사전 생성 오디오 우선
//         fallback: Web Speech API
// ════════════════════════════════════════════════════
function speak(text, rate = 0.8) {
  return new Promise(resolve => {
    const src = AUDIO_MAP[text];
    if (src) {
      S.synth.cancel();
      const a = new Audio(src);
      // Neural2 파일은 0.85 속도로 생성됨 → 추가 조정 없이 자연스럽게 재생
      a.onended = () => { S.t0 = Date.now(); resolve(); };
      a.onerror  = () => speakFallback(text, rate).then(resolve);
      a.play().catch(() => speakFallback(text, rate).then(resolve));
    } else {
      speakFallback(text, rate).then(resolve);
    }
  });
}

function speakFallback(text, rate = 0.8) {
  return new Promise(resolve => {
    S.synth.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/　/g, ''));
    u.lang  = 'ja-JP';
    u.rate  = rate;
    u.pitch = 1.0;
    if (S.jpVoice) u.voice = S.jpVoice;
    u.onend  = () => { S.t0 = Date.now(); resolve(); };
    u.onerror = () => { S.t0 = Date.now(); resolve(); };
    S.synth.speak(u);
  });
}

function playTTS() {
  const p   = CURRICULUM[S.day].phrases[S.phrase];
  const btn = $('btnPlay');
  btn.classList.add('playing');
  S.t0 = null; // FFD 리셋 (수동 듣기 후 수동 녹음하는 경우)
  speak(p.jp).then(() => btn.classList.remove('playing'));
}

// ════════════════════════════════════════════════════
// [기능 B] 음절 가중치 기반 스코어링 (W_end = 1.5)
// ════════════════════════════════════════════════════
function lev(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) =>
    Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i=1; i<=m; i++)
    for (let j=1; j<=n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function norm(s) {
  // 공백·구두점 제거 후 히라가나→가타카나 변환(루즈 매칭)
  return s.replace(/[\s　・、。！？→「」]/g, '')
          .split('').map(c => {
            const code = c.charCodeAt(0);
            return (code >= 0x3041 && code <= 0x3096)
              ? String.fromCharCode(code + 0x60) : c;
          }).join('');
}

function score(orig, spoken) {
  const a = norm(orig), b = norm(spoken);
  if (!b) return 0;

  const totalLen = Math.max(a.length, b.length, 1);

  // 종결 어미 구간: 마지막 3~4음절 (W_end = 1.5)
  const endLen  = Math.min(4, Math.max(2, Math.floor(a.length * 0.3)));
  const bodyLen = Math.max(1, totalLen - endLen);

  const aBody = a.slice(0, a.length - endLen);
  const bBody = b.slice(0, Math.max(0, b.length - endLen));
  const aEnd  = a.slice(-endLen);
  const bEnd  = b.slice(-Math.min(endLen, b.length));

  const bodyDist  = lev(aBody, bBody);
  const endDist   = lev(aEnd,  bEnd);

  const bodyRatio = Math.max(0, 1 - bodyDist / Math.max(aBody.length, bBody.length, 1));
  const endRatio  = Math.max(0, 1 - endDist  / Math.max(aEnd.length,  bEnd.length,  1));

  const W_END = 1.5;
  const totalWeight   = bodyLen + endLen * W_END;
  const weightedScore = (bodyRatio * bodyLen + endRatio * endLen * W_END) / totalWeight;

  return Math.round(weightedScore * 100);
}

// ════════════════════════════════════════════════════
// [기능 C] 시각적 diff + 말풍선 힌트
// ════════════════════════════════════════════════════
// 조사·어미 힌트 맵
const HINT_MAP = [
  ['ません', '부정 어미 ません (안 합니다)'],
  ['ました', '과거 어미 ました (했습니다)'],
  ['ましょう', '권유 어미 ましょう (합시다)'],
  ['たいです', '희망 たいです (하고 싶습니다)'],
  ['ください', '요청 ください (주세요)'],
  ['います', '존재 います (있습니다)'],
  ['あります', '존재 あります (있습니다)'],
  ['できます', '가능 できます (할 수 있습니다)'],
  ['います', '정중체 います'],
  ['ます', '정중체 어미 ます'],
  ['に', '조사 に (에/에게)'],
  ['を', '조사 を (을/를)'],
  ['が', '조사 が (이/가)'],
  ['で', '조사 で (에서)'],
  ['と', '조사 と (과/와)'],
  ['は', '조사 は (은/는)'],
  ['も', '조사 も (도)'],
  ['の', '조사 の (의)'],
  ['へ', '조사 へ (으로)'],
];

function getHint(char) {
  for (const [pat, hint] of HINT_MAP) {
    if (pat.includes(char)) return hint;
  }
  return `정답 글자: ${char}`;
}

function buildDiff(orig, spoken) {
  const a = [...orig.replace(/　/g, ' ')];
  const b = [...spoken];
  const m = a.length, n = b.length;

  // LCS dp
  const dp = Array.from({length: m+1}, () => new Int16Array(n+1));
  for (let i=1; i<=m; i++)
    for (let j=1; j<=n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1
        : Math.max(dp[i-1][j], dp[i][j-1]);

  // Backtrack
  const ops = []; let i=m, j=n;
  while (i>0 || j>0) {
    if (i>0 && j>0 && a[i-1] === b[j-1]) {
      ops.unshift({t:'eq', c: a[i-1]}); i--; j--;
    } else if (j>0 && (i===0 || dp[i][j-1] >= dp[i-1][j])) {
      ops.unshift({t:'ins', c: b[j-1]}); j--;
    } else {
      ops.unshift({t:'del', c: a[i-1]}); i--;
    }
  }

  let origHtml = '', spokenHtml = '';
  ops.forEach(op => {
    const esc = c => c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    if (op.t === 'eq') {
      origHtml   += `<span class="diff-ok">${esc(op.c)}</span>`;
      spokenHtml += `<span class="diff-ok">${esc(op.c)}</span>`;
    } else if (op.t === 'del') {
      // 원문에만 있고 유저가 빠뜨린 글자 → 주황 힌트
      const hint = esc(getHint(op.c));
      origHtml += `<span class="diff-miss" data-hint="${hint}">${esc(op.c)}</span>`;
    } else {
      // 유저가 잘못 말한 글자 → 빨간 취소선
      const hint = esc(`잘못 발음됨 (정답 없음)`);
      spokenHtml += `<span class="diff-ng" data-hint="${hint}">${esc(op.c)}</span>`;
    }
  });

  return { origHtml, spokenHtml };
}

// ════════════════════════════════════════════════════
// [기능 D] 속도계 렌더링
// ════════════════════════════════════════════════════
const CIRC = 314; // 2π × 50

function renderSpeedo(fillId, numId, sc, ffd, vadCnt, titleId, subId) {
  const fill = CIRC * sc / 100;
  const el   = $(fillId);
  if (!el) return;

  el.setAttribute('stroke-dasharray', `${fill} ${CIRC}`);

  const color = sc >= 85 ? '#10b981' : sc >= 60 ? '#f59e0b' : '#ef4444';
  el.style.stroke = color;

  if (numId) $(numId).textContent = sc;

  if (!titleId) return;

  // 피드백 타이틀 생성
  let title, sub;
  const ffdSec = ffd ? (ffd / 1000).toFixed(1) : null;

  if (sc >= 95 && ffd !== null && ffd <= 1000) {
    title = '⚡ 조건반사 마스터!';
    sub   = `뇌 회로 ${ffdSec}초 · 완벽 유창성`;
  } else if (sc >= 85 && ffd !== null && ffd <= 1500) {
    title = '🎯 유창성 우수!';
    sub   = `반응 ${ffdSec}초 · 계속 이 속도로`;
  } else if (sc >= 85) {
    title = '✅ 통과!';
    sub   = ffdSec ? `반응 ${ffdSec}초` : '잘했어요!';
  } else if (sc >= 60) {
    title = '👍 조금 더!';
    sub   = '85점 이상이면 다음으로 넘어갑니다';
  } else {
    title = '💪 다시 도전!';
    sub   = '발음을 더 명확하게 해보세요';
  }

  if (vadCnt > 0) sub += ` · 머뭇거림 ${vadCnt}회 발생`;

  $(titleId).textContent = title;
  $(subId).textContent   = sub;
}

// ════════════════════════════════════════════════════
// SHOW FEEDBACK  (속도계 + FFD/VAD 칩 통합)
// ════════════════════════════════════════════════════
function showFeedback(orig, spoken) {
  const sc = score(orig, spoken);
  S.lastScore = sc;
  logStat(sc, S.ffd, S.vadCount);

  const { origHtml, spokenHtml } = buildDiff(orig, spoken);
  $('fbOriginal').innerHTML = origHtml  || orig;
  $('fbSpoken').innerHTML   = spokenHtml || '<span style="color:var(--text-dim)">인식 못함</span>';

  // 속도계
  renderSpeedo('speedoFill', 'speedoNum', sc, S.ffd, S.vadCount, 'speedoTitle', 'speedoSub');

  // FFD 칩
  const ffdEl = $('ffdChip');
  if (S.ffd !== null) {
    const sec = (S.ffd / 1000).toFixed(1);
    if (S.ffd <= 1000) {
      ffdEl.textContent = `⚡ 반응속도: ${sec}초 ✅`;
      ffdEl.className   = 'ffd-chip fast';
    } else if (S.ffd <= 2000) {
      ffdEl.textContent = `⏱ 반응속도: ${sec}초`;
      ffdEl.className   = 'ffd-chip warn';
    } else {
      ffdEl.textContent = `🐢 반응속도: ${sec}초`;
      ffdEl.className   = 'ffd-chip slow';
    }
  } else {
    ffdEl.textContent = '⚡ 반응속도: —';
    ffdEl.className   = 'ffd-chip';
  }

  // VAD 칩
  const vadEl = $('vadChip');
  if (S.vadCount === 0) {
    vadEl.textContent = '🔊 막힘없음 ✅';
    vadEl.className   = 'ffd-chip fast';
  } else if (S.vadCount === 1) {
    vadEl.textContent = `🔇 머뭇거림: ${S.vadCount}회`;
    vadEl.className   = 'ffd-chip warn';
  } else {
    vadEl.textContent = `🔇 머뭇거림: ${S.vadCount}회`;
    vadEl.className   = 'ffd-chip slow';
  }

  $('feedbackPanel').classList.add('show');
  $('feedbackPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ════════════════════════════════════════════════════
// STT — 수동 마이크  [기능 A] FFD + VAD 통합
// ════════════════════════════════════════════════════
function startRec(e) {
  if (e) e.preventDefault();
  if (S.recActive || S.lockActive) return;
  S.recActive = true;

  // FFD / VAD 초기화
  S.ffd          = null;
  S.vadCount     = 0;
  S.vadLastSpeech = null;
  if (S.vadTimer) { clearInterval(S.vadTimer); S.vadTimer = null; }

  $('btnMic').classList.add('recording');
  $('waveform').classList.add('active');

  const p  = CURRICULUM[S.day].phrases[S.phrase];
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    // 브라우저 미지원 → 시뮬레이션 (하이브리드 앱 환경 플래그 설정 필요)
    if (S.isNativePlatform) {
      showToast('🎙 네이티브 STT 플러그인 연결 필요 (Flutter/RN)');
    }
    setTimeout(() => {
      const fake = p.jp.replace(/　/g,'').slice(0, Math.max(2, p.jp.replace(/　/g,'').length - 1));
      showFeedback(p.jp, fake);
      stopRecUI();
    }, 1800);
    return;
  }

  S.recObj = new SR();
  S.recObj.lang             = 'ja-JP';
  S.recObj.interimResults   = true;   // VAD 감지를 위해 중간 결과 필요
  S.recObj.maxAlternatives  = 3;
  S.recObj.continuous       = true;

  // ── [기능 A] FFD: 최초 발화 감지 시각 스탬핑
  S.recObj.onspeechstart = () => {
    if (S.t0 !== null && S.ffd === null) {
      S.ffd = Date.now() - S.t0;
    }
    S.vadLastSpeech = Date.now();
  };

  // ── [기능 A] VAD + 결과 누적 (continuous 방식)
  let accumulated = '';
  S.recObj.onresult = e => {
    const now = Date.now();
    if (S.vadLastSpeech !== null && now - S.vadLastSpeech > 500) S.vadCount++;
    S.vadLastSpeech = now;

    // final 결과만 누적
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) accumulated += e.results[i][0].transcript;
    }

    // 침묵 1.2초 후 자동 완료
    clearTimeout(S.silenceTimer);
    S.silenceTimer = setTimeout(() => {
      if (accumulated) showFeedback(p.jp, accumulated);
      stopRec();
    }, 1200);
  };

  // ── STT 오류 처리 — 하이브리드 앱 권장 가이드 토스트 연동
  S.recObj.onerror = ev => {
    const errMap = {
      'no-speech':       '🎙 소음이 없는 곳에서 다시 말씀해 주세요',
      'audio-capture':   '🎤 마이크를 확인해 주세요',
      'not-allowed':     '🔒 마이크 권한을 허용해 주세요',
      'network':         '🌐 네트워크 연결을 확인해 주세요',
      'aborted':         null,
    };
    const msg = errMap[ev.error] ?? '🎙 소음이 없는 곳에서 다시 말씀해 주세요';
    if (msg) showToast(msg);
    stopRecUI();
  };

  S.recObj.onspeechend = () => {
    // 발화 종료 → 결과 대기 (onresult가 처리)
  };
  S.recObj.onend = () => stopRecUI();

  S.recObj.start();
}

function stopRec() {
  if (!S.recActive) return;
  if (S.recObj) { try { S.recObj.stop(); } catch(e) {} S.recObj = null; }
  stopRecUI();
}

function stopRecUI() {
  S.recActive = false;
  if (S.vadTimer)    { clearInterval(S.vadTimer); S.vadTimer = null; }
  if (S.silenceTimer){ clearTimeout(S.silenceTimer); S.silenceTimer = null; }
  $('btnMic').classList.remove('recording');
  $('waveform').classList.remove('active');
}

// ════════════════════════════════════════════════════
// LISTEN & REPEAT (3회)  ── FFD/VAD 통합
// ════════════════════════════════════════════════════
async function startLR() {
  if (S.lrActive) return;
  S.lrActive = true;
  S.lrScores = [];

  const p = CURRICULUM[S.day].phrases[S.phrase];
  $('lrPhrase').textContent  = p.jp;
  $('lrReading').textContent = p.rd;
  $('lrSpeedoWrap').style.display = 'none';
  $('lrModal').classList.add('open');

  for (let i=0; i<3; i++) {
    $(`lrChip${i}`).className = 'lr-chip';
    $(`lrChip${i}`).textContent = `${i+1}회`;
  }

  for (let round = 0; round < 3; round++) {
    if (!S.lrActive) break;
    await runLRRound(round, p.jp);
    await sleep(350);
  }

  if (!S.lrActive) return;

  // 요약 속도계
  const avg = S.lrScores.length
    ? Math.round(S.lrScores.reduce((a,b)=>a+b,0) / S.lrScores.length) : 0;

  setLRDots(3);
  $('lrIcon').textContent  = avg >= 85 ? '🎉' : avg >= 60 ? '👍' : '💪';
  $('lrIcon').className    = 'lr-icon';
  $('lrStatus').textContent = avg >= 85 ? '클리어!' : avg >= 60 ? '잘했어요!' : '더 연습해요!';
  $('lrSub').textContent   = `평균 ${avg}점`;

  $('lrSpeedoWrap').style.display = 'block';
  renderSpeedo('lrSpeedoFill', 'lrSpeedoNum', avg, null, 0, null, null);

  setTimeout(() => { if (S.lrActive) closeLR(); }, 3000);
}

async function runLRRound(round, jpText) {
  setLRDots(round);

  // ① Listen
  $('lrIcon').textContent = '🔊';
  $('lrIcon').className   = 'lr-icon';
  $('lrStatus').textContent = `${round+1}회 · 잘 들으세요`;
  $('lrSub').textContent  = '재생 중...';

  await speak(jpText, 0.78);
  // T0는 speak() 내부에서 스탬핑됨
  if (!S.lrActive) return;
  await sleep(250);

  // ② Repeat
  $('lrIcon').textContent = '🎤';
  $('lrIcon').className   = 'lr-icon mic-anim';
  $('lrStatus').textContent = `${round+1}회 · 따라해 보세요!`;
  $('lrSub').textContent  = '4초 안에 말하기';

  const sc = await lrRecord(jpText);
  if (!S.lrActive) return;
  S.lrScores.push(sc);
  logStat(sc, S.ffd, S.vadCount);

  const chip = $(`lrChip${round}`);
  chip.className   = 'lr-chip ' + (sc >= 85 ? 'scored' : 'fail');
  chip.textContent = `${round+1}회 ${sc}점`;

  // 즉각 피드백 서브텍스트
  const ffdSec = S.ffd !== null ? (S.ffd/1000).toFixed(1) : null;
  $('lrSub').textContent = ffdSec
    ? `반응 ${ffdSec}초 · ${sc}점`
    : `${sc}점`;
}

function lrRecord(targetJp) {
  return new Promise(resolve => {
    // FFD/VAD 초기화 (각 회차별)
    S.ffd = null; S.vadCount = 0; S.vadLastSpeech = null;

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setTimeout(() => resolve(Math.floor(Math.random()*35) + 50), 2500);
      return;
    }

    const r = new SR();
    r.lang             = 'ja-JP';
    r.interimResults   = true;
    r.maxAlternatives  = 3;

    let done = false;
    const finish = sc => { if (!done) { done = true; resolve(sc); } };

    r.onspeechstart = () => {
      if (S.t0 !== null && S.ffd === null) S.ffd = Date.now() - S.t0;
      S.vadLastSpeech = Date.now();
    };

    r.onresult = e => {
      const now = Date.now();
      if (S.vadLastSpeech && now - S.vadLastSpeech > 500) S.vadCount++;
      S.vadLastSpeech = now;
      const last = e.results[e.results.length - 1];
      if (last.isFinal) finish(score(targetJp, last[0].transcript));
    };

    r.onerror = ev => {
      if (ev.error === 'no-speech') showToast('🎙 소음이 없는 곳에서 다시 말씀해 주세요');
      finish(0);
    };
    r.onend = () => finish(0);

    r.start();
    setTimeout(() => { try { r.stop(); } catch(e) {} }, 4200);
  });
}

function setLRDots(cur) {
  for (let i=0; i<3; i++) {
    $(`lrd${i}`).className = 'lr-dot'
      + (i < cur ? ' done' : i === cur ? ' current' : '');
  }
}

function closeLR() {
  S.lrActive = false;
  $('lrModal').classList.remove('open');
  S.synth.cancel();
}

// ════════════════════════════════════════════════════
// DAY DRAWER
// ════════════════════════════════════════════════════
function buildDayGrid() {
  const g = $('dayGrid');
  g.innerHTML = '';
  for (let d = 1; d <= 30; d++) {
    const b = document.createElement('button');
    b.className = 'day-btn'
      + (d === S.day       ? ' current' : '')
      + (S.doneDays.has(d) ? ' done'    : '');
    b.textContent = d;
    b.onclick = () => goToDay(d);
    g.appendChild(b);
  }
}
function openDrawer()  { $('dayDrawer').classList.add('open');  $('drawerOverlay').classList.add('open');  }
function closeDrawer() { $('dayDrawer').classList.remove('open'); $('drawerOverlay').classList.remove('open'); }

// ════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════
const $     = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));

let _toastTimer = null;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS  (기존 바인딩 누수 없이 유지)
// ════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextPhrase();
  if (e.key === 'ArrowLeft')  prevPhrase();
  if (e.key === ' ')          { e.preventDefault(); toggleReveal(); }
  if (e.key === 'Enter')      playTTS();
  if (e.key === 'Escape')     { closeLR(); closeDrawer(); closeStats(); }
});

// START

init();
</script>
